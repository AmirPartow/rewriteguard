name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Job 1: Run tests (non-blocking - deployment proceeds even if tests fail)
  # ===========================================================================
  test:
    name: Pre-deploy tests
    runs-on: ubuntu-latest
    # Continue even if tests fail so deploy can proceed
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend tests
        working-directory: backend
        run: python -m pytest -q

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend tests
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm test

  # ===========================================================================
  # Job 2: Deploy backend to EC2 via SSH
  # ===========================================================================
  deploy-backend:
    name: Deploy API to EC2
    needs: test
    # Run even if tests fail (if: always() with needs means it waits for test to finish)
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd ~/rewriteguard/backend
            git pull origin main
            docker compose build api
            docker compose up -d api
            sleep 10
            curl -sf http://localhost:8000/health/live && echo "✅ API healthy" || echo "❌ API unhealthy"
          EOF

  # ===========================================================================
  # Job 3: Frontend auto-deploys on Vercel (no action needed)
  # ===========================================================================
  notify:
    name: Deployment Summary
    needs: [deploy-backend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "✅ Backend deployed to EC2"
          echo "✅ Frontend auto-deploys to Vercel"
          echo "🌐 API: https://www.rewriteguard.com"
          echo "🌐 App: https://www.rewriteguard.com"
