# =============================================================================
# RewriteGuard Nginx — Reverse-proxy API + serve frontend SPA
# =============================================================================
# Serves:
#   - /v1/*, /health*, /cache-stats, /protected, /docs → API backend
#   - Everything else → frontend static files (SPA with fallback to index.html)
# =============================================================================

upstream backend {
    server api:8000;
    keepalive 16;
}

# Rate limiting: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge (certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── API routes → proxy to backend ───────────────────────────────
    # Health checks (no rate limit, no logging)
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        access_log off;
    }

    location /health/live {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        access_log off;
    }

    location /health/ready {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # API v1 routes
    location /v1/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Other API endpoints
    location /cache-stats {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /protected {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ─── Frontend SPA → serve static files ───────────────────────────
    # Static assets (JS, CSS, images) — long cache
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Vite SVG
    location /vite.svg {
        alias /usr/share/nginx/html/vite.svg;
        expires 1y;
    }

    # SPA fallback — serve index.html for all other routes
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Block exploit paths
    location ~ /\. { deny all; return 404; }
    location ~* ^/(wp-admin|wp-login|phpmyadmin) { deny all; return 404; }

    client_max_body_size 10m;
}
